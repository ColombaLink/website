<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7CB5;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3A6495;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="iconGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7CB5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B9AD0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient1)"/>

  <!-- Compass/Discovery icon -->
  <g transform="translate(200, 150)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#iconGradient1)" stroke-width="3"/>

    <!-- Compass needle pointing up -->
    <path d="M 0,-50 L 8,-10 L 0,0 L -8,-10 Z" fill="#4A7CB5"/>
    <path d="M 0,50 L 8,10 L 0,0 L -8,10 Z" fill="#6B9AD0" opacity="0.6"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#3A6495"/>

    <!-- Cardinal markers -->
    <circle cx="0" cy="-65" r="3" fill="#4A7CB5"/>
    <circle cx="65" cy="0" r="3" fill="#4A7CB5" opacity="0.5"/>
    <circle cx="0" cy="65" r="3" fill="#4A7CB5" opacity="0.5"/>
    <circle cx="-65" cy="0" r="3" fill="#4A7CB5" opacity="0.5"/>
  </g>
</svg>
