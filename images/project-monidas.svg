<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#blueGrad)"/>

  <!-- Decorative circles -->
  <circle cx="500" cy="150" r="180" fill="#3b82f6" opacity="0.2"/>
  <circle cx="100" cy="650" r="150" fill="#60a5fa" opacity="0.15"/>

  <!-- Dashboard/Monitor Icon -->
  <g transform="translate(150, 250)" opacity="0.3">
    <rect x="50" y="80" width="200" height="140" rx="8" stroke="white" stroke-width="6" fill="none"/>
    <path d="M80 120L120 160L160 130L200 150" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="130" r="8" fill="white"/>
    <line x1="80" y1="240" x2="220" y2="240" stroke="white" stroke-width="5"/>
  </g>

  <!-- Text -->
  <text x="300" y="420" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">IoT</text>
  <text x="300" y="490" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">MONITORING</text>
  <text x="300" y="560" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">Real-time Platform</text>
</svg>
