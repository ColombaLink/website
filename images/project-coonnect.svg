<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#greenGrad)"/>

  <!-- Decorative circles -->
  <circle cx="480" cy="180" r="160" fill="#34d399" opacity="0.2"/>
  <circle cx="120" cy="620" r="140" fill="#6ee7b7" opacity="0.15"/>

  <!-- People/Network Icon -->
  <g transform="translate(150, 250)" opacity="0.3">
    <circle cx="120" cy="120" r="35" stroke="white" stroke-width="6" fill="none"/>
    <circle cx="200" cy="120" r="35" stroke="white" stroke-width="6" fill="none"/>
    <path d="M120 156C120 200 140 220 160 220C180 220 200 200 200 156" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="105" y1="205" x2="95" y2="240" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="215" y1="205" x2="225" y2="240" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="300" y="420" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">RECRUITING</text>
  <text x="300" y="490" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">PLATFORM</text>
  <text x="300" y="560" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">Active Sourcing</text>
</svg>
