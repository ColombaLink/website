<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B9AD0;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4A7CB5;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="iconGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B9AD0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7CB5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient2)"/>

  <!-- Rocket/Launch icon -->
  <g transform="translate(200, 150)">
    <!-- Rocket body -->
    <ellipse cx="0" cy="-20" rx="25" ry="50" fill="url(#iconGradient2)"/>

    <!-- Rocket nose -->
    <path d="M -25,-70 L 0,-90 L 25,-70 Z" fill="#3A6495"/>

    <!-- Windows -->
    <circle cx="0" cy="-40" r="8" fill="#f1f4ef" opacity="0.9"/>
    <circle cx="0" cy="-15" r="8" fill="#f1f4ef" opacity="0.9"/>

    <!-- Side fins -->
    <path d="M -25,-10 L -45,10 L -25,20 Z" fill="#6B9AD0"/>
    <path d="M 25,-10 L 45,10 L 25,20 Z" fill="#6B9AD0"/>

    <!-- Exhaust flames -->
    <ellipse cx="0" cy="45" rx="20" ry="25" fill="#f0c36d" opacity="0.6"/>
    <ellipse cx="-8" cy="55" rx="12" ry="18" fill="#f0c36d" opacity="0.5"/>
    <ellipse cx="8" cy="55" rx="12" ry="18" fill="#f0c36d" opacity="0.5"/>
  </g>
</svg>
