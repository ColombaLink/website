<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7CB5;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#3A6495;stop-opacity:0.06" />
    </linearGradient>
    <linearGradient id="iconGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7CB5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A6495;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient4)"/>

  <!-- Dashboard/Monitoring icon -->
  <g transform="translate(200, 150)">
    <!-- Monitor screen outline -->
    <rect x="-55" y="-40" width="110" height="70" rx="4"
          fill="none" stroke="url(#iconGradient4)" stroke-width="3"/>

    <!-- Screen content - line chart -->
    <path d="M -45,-20 L -30,-10 L -15,-25 L 0,-15 L 15,-30 L 30,-20 L 45,-25"
          fill="none" stroke="#4A7CB5" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Trend up indicator -->
    <path d="M 35,-30 L 45,-25 L 40,-20" fill="none" stroke="#4A7CB5" stroke-width="2" stroke-linecap="round"/>

    <!-- Base dots (metrics) -->
    <circle cx="-30" cy="-10" r="3" fill="#6B9AD0"/>
    <circle cx="0" cy="-15" r="3" fill="#6B9AD0"/>
    <circle cx="30" cy="-20" r="3" fill="#3A6495"/>

    <!-- Monitor stand -->
    <rect x="-15" y="30" width="30" height="5" rx="2" fill="#4A7CB5" opacity="0.7"/>
    <rect x="-5" y="35" width="10" height="15" fill="#4A7CB5" opacity="0.5"/>

    <!-- Status indicators in corners -->
    <circle cx="-48" cy="-33" r="2.5" fill="#4A7CB5"/>
    <circle cx="-40" cy="-33" r="2.5" fill="#6B9AD0" opacity="0.6"/>
    <circle cx="-32" cy="-33" r="2.5" fill="#6B9AD0" opacity="0.6"/>
  </g>
</svg>
